version: '3.9'
services:
  web:
    build: .
    command: gunicorn medtribute.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env.example
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: medtribute
      POSTGRES_USER: medtribute
      POSTGRES_PASSWORD: medtribute
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
volumes:
  postgres_data:
